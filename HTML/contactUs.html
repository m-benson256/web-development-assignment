<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NTARE SCHOOL</title>
        <style>
            body{
                background-color:#faf7f2;
                background-image: url('Lion2-1140x694.webp');
                background-size: cover;
                padding: 50px;
            }
            #contact-us{
                text-align: center;
                color: #333;
                margin-bottom: 20px;
            }
            .arrange{
                display: flex;
                flex-wrap: wrap;
                gap: 30px;
                margin: auto;
                justify-content: space-between;
                max-width: 1200px;
                align-items: flex-start;
            }
            .address{
                background-color: rgba(255, 255, 255, 0.8);
                padding: 20px;
                margin: 40px auto;
                max-width: 300px;
                border-radius: 8px;
                gap: 50px;
            }
            .form-row input, .form-row textarea{
                width: auto;
                padding: 10px;
                margin-bottom: 20px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }
            
            button{
                background-color: #4CAF50;
                color: white;
                padding: 10px 20px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h1 id="contact-us">Contact Us</h1>
        <img src="ntare.webp" alt="ntare.webp" style="display: block; margin: 0 auto 20px; width: 150px;">
        
        <section class="contact">
            <div class="arrange">
            <div class="address">
                <h3>Address</h3>
                <p>Ntare road, 256 Mbarara</p>
            </div>
            <div class="address">
                <h3>Email</h3>
                <p>ntare@ntareschool.sc.ug</p>
            </div>
            <div class="address">
                <h3>Phone</h3>
                <p>039-323-8192</p>
            </div>
            
        <form>
            <div class="form-row">
                <h2>Contact Us</h2>
            </div>
            <div class="form-row">
                <input type = "text" placeholder="Name*"><br>
                <input type = "email" placeholder="Email*"><br>
                <input type = "text" placeholder="Subject*"><br>
                <input type = "text" placeholder="Phone"><br>
                <textarea placeholder="MessageUs*" rows="12"></textarea><br>
                <button type="submit">SEND MESSAGE</button>
            </div>
            </div>
        </form>
        </section>
    </body>
</html>
